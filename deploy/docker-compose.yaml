version: '3.8'

services:
  docker-mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    image: docker-mcp:latest
    container_name: docker-mcp
    restart: unless-stopped
    # 挂载 Docker socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # HTTP 模式需要暴露端口
    ports:
      - "8080:8080"
    # 使用 HTTP 模式，支持环境变量配置 API Key
    command: ["--mode", "http", "--port", "8080"]
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      # API Key 鉴权（可选，不设置则不启用鉴权）
      # - MCP_API_KEY=your-secret-api-key
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - docker-mcp-network

networks:
  docker-mcp-network:
    driver: bridge